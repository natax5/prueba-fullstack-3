<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web Simple</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Bienvenido a mi página</h1>
    <p>Este es un ejemplo de página HTML básica. Aquí puedes escribir cualquier texto que desees.</p>

    <h2>Enlace de ejemplo</h2>
    <p>Visita <a href="https://www.example.com" target="_blank">este sitio</a> para más información.</p>

    <h2>Imagen de ejemplo</h2>
    <img src="https://via.placeholder.com/300" alt="Imagen de ejemplo">

    <h2>Lista de elementos</h2>
    <ul>
        <li>Elemento uno</li>
        <li>Elemento dos</li>
        <li>Elemento tres</li>
    </ul>

</body>
</html>
